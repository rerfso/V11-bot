services:
  - type: web
    name: v11-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000

  - type: worker
    name: v11-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app/bot.py
